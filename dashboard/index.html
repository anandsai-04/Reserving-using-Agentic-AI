<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actuarial Reserving Platform</title>
  <meta name="description" content="AI-assisted actuarial loss reserving — Chain Ladder, BF, Benktander, Cape Cod, Mack, Case Outstanding, Clark.">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">

  <!-- ── Top Bar ──────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-brand">Actuarial <span>Reserve</span></div>

    <!-- Step progress -->
    <div id="step-bar"></div>

    <div class="topbar-right">
      <!-- AI Settings removed per user request -->
    </div>
  </header>

  <!-- ── Left Panel: Agent Log + Chat ─────────────────────────── -->
  <aside class="left-panel">
    <div class="left-panel-header">
      ◆ Agent Activity &amp; Chat
    </div>

    <div id="agent-log">
      <!-- Populated by app.js -->
    </div>

    <div class="chat-input-area">
      <textarea
        id="chat-input"
        placeholder="Ask anything about your reserves… (Enter to send)"
        rows="1"></textarea>
      <button id="chat-send">Send</button>
    </div>
  </aside>

  <!-- ── Right Panel: Working Area ────────────────────────────── -->
  <main class="right-panel" id="right-panel">
    <!-- Populated dynamically by app.js -->
  </main>

</div>

<!-- Modal removed per user request -->

<!-- Scripts — order matters -->
<script src="js/app.js?v=16"></script>

</body>
</html>

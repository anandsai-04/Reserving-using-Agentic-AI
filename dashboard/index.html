<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Actuarial Reserving Platform</title>
  <meta name="description" content="AI-assisted actuarial loss reserving — Chain Ladder, BF, Benktander, Cape Cod, Mack, Case Outstanding, Clark.">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">

  <!-- ── Top Bar ──────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-brand">Actuarial <span>Reserve</span></div>

    <!-- Step progress -->
    <div id="step-bar"></div>

    <div class="topbar-right">
      <button class="api-key-btn" id="api-key-btn">
        <div class="api-key-indicator" id="api-key-indicator" title="AI not connected"></div>
        AI Settings
      </button>
    </div>
  </header>

  <!-- ── Left Panel: Agent Log + Chat ─────────────────────────── -->
  <aside class="left-panel">
    <div class="left-panel-header">
      ◆ Agent Activity &amp; Chat
    </div>

    <div id="agent-log">
      <!-- Populated by app.js -->
    </div>

    <div class="chat-input-area">
      <textarea
        id="chat-input"
        placeholder="Ask anything about your reserves… (Enter to send)"
        rows="1"></textarea>
      <button id="chat-send">Send</button>
    </div>
  </aside>

  <!-- ── Right Panel: Working Area ────────────────────────────── -->
  <main class="right-panel" id="right-panel">
    <!-- Populated dynamically by app.js -->
  </main>

</div>

<!-- ── API Key Modal ──────────────────────────────────────────── -->
<div class="modal" id="api-key-modal">
  <div class="modal-box">
    <div class="modal-title">Universal AI Settings</div>
    <div class="modal-sub">Configure any OpenAI-compatible API (OpenRouter, Groq, OpenAI, etc).</div>
    
    <label style="display:block; margin-top:12px; font-size:12px; color:rgba(255,255,255,0.6);">Base URL</label>
    <input type="text" id="api-baseurl-input" class="modal-input" placeholder="https://openrouter.ai/api/v1">
    
    <label style="display:block; margin-top:12px; font-size:12px; color:rgba(255,255,255,0.6);">Model Name</label>
    <input type="text" id="api-model-input" class="modal-input" placeholder="google/gemini-2.0-flash-exp:free">
    
    <label style="display:block; margin-top:12px; font-size:12px; color:rgba(255,255,255,0.6);">API Key</label>
    <input type="password" id="api-key-input" class="modal-input" placeholder="sk-...">
    
    <div class="modal-actions" style="margin-top:20px;">
      <button class="modal-cancel" id="api-key-cancel">Cancel</button>
      <button class="modal-save" id="api-key-save">Save Settings</button>
    </div>
  </div>
</div>

<!-- Scripts — order matters -->
<script src="js/app.js?v=16"></script>

</body>
</html>
